name: CS2 Data Pipeline

on:
  # Run every 30 minutes during peak hours (10am-2am UTC, covers major tournaments)
  schedule:
    - cron: '*/30 10-23 * * *'  # Every 30 min, 10am-11pm UTC
    - cron: '*/30 0-2 * * *'    # Every 30 min, midnight-2am UTC
    - cron: '0 6 * * *'         # Daily full sync at 6am UTC
    - cron: '0 5 * * 0'         # Weekly ML retraining on Sundays at 5am UTC
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Run full historical sync'
        required: false
        default: 'false'
        type: boolean
      source:
        description: 'Data source to sync'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - pandascore
          - abios
          - odds

jobs:
  sync-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data_pipeline/requirements.txt'
      
      - name: Install dependencies
        run: |
          cd data_pipeline
          pip install -r requirements.txt
      
      - name: Run data pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
          ABIOS_CLIENT_ID: ${{ secrets.ABIOS_CLIENT_ID }}
          ABIOS_CLIENT_SECRET: ${{ secrets.ABIOS_CLIENT_SECRET }}
          ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
        run: |
          cd data_pipeline
          # Determine if full sync (scheduled at 6am or manual)
          FULL_SYNC=false
          SOURCE="all"
          
          # Check if this is a scheduled run at 6am UTC (cron: '0 6 * * *')
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # For scheduled runs, check if it's the 6am run by checking the hour
            CURRENT_HOUR=$(date -u +%H)
            if [[ "$CURRENT_HOUR" == "06" ]]; then
              FULL_SYNC=true
            fi
          fi
          
          # Override with manual input if provided
          if [[ "${{ github.event.inputs.full_sync }}" == "true" ]]; then
            FULL_SYNC=true
          fi
          
          if [[ -n "${{ github.event.inputs.source }}" ]]; then
            SOURCE="${{ github.event.inputs.source }}"
          fi
          
          if [[ "$FULL_SYNC" == "true" ]]; then
            echo "Running full sync..."
            python main.py --full-sync --source $SOURCE
          else
            echo "Running regular sync..."
            python main.py --source $SOURCE
          fi

  # Weekly ML model retraining (Sundays at 5am UTC)
  retrain-models:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data_pipeline/requirements.txt'
      
      - name: Install dependencies
        run: |
          cd data_pipeline
          pip install -r requirements.txt
      
      - name: Check if retraining needed
        id: check_retrain
        run: |
          DAY_OF_WEEK=$(date -u +%w)
          CURRENT_HOUR=$(date -u +%H)
          if [[ "$DAY_OF_WEEK" == "0" && "$CURRENT_HOUR" == "05" ]]; then
            echo "should_retrain=true" >> $GITHUB_OUTPUT
          else
            echo "should_retrain=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Retrain ML models
        if: steps.check_retrain.outputs.should_retrain == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd data_pipeline
          echo "Running ML model retraining..."
          python ml/train.py --save-model
      
      - name: Upload model artifacts
        if: steps.check_retrain.outputs.should_retrain == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ml-models
          path: data_pipeline/ml/models/
          retention-days: 30
